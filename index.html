}

body{

    background:#311e84;
    color:white;
    display:flex;
    justify-content:center;

.container{

.profile{
    text-align:center;

.profile img{

.tagline{

.section h2{

}

.card{

    width:100%;

    color:#1c205d;
    text-decoration:none;
    padding:18px;
    border-radius:10px;
    margin-bottom:12px;

    transition:.15s;

        0 1px 3px rgba(0,0,0,.12),

}

.card:hover{

}

.card:active{

.footer{
